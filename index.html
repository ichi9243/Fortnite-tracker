<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UFT-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Spirit Traker</title>
    <link rel="stylesheet" href="style.css">



</head>
<body>

    <header>
        <h1>Fortnite Spirits</h1>
        <div class="progress-container">
            <span id="progress-text">Capturados: 0 / 61</span>
            <progress id="progress-bar" value="0" max="61"></progress>

        </div>
    </header>

    <nav class="filters">
        <button id="btn-all" class="active">Todos</button>
        <button id="btn-captured">Capturados</button>
        <button id="btn-missing">Faltantes</button>
    </nav>

    <main id="spirits-grid" class="grid-container">

    </main>

    <footer>
        <button id="btn-reset" class="danger-btn">Borrar Progreso</button>
    </footer>

    <script src="script.js"></script>
    

</body>




</html>
